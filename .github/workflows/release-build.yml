name: Release Build Static Assets

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-static-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint check
        run: pnpm run lint

      - name: Build static site
        run: pnpm run build

      - name: Archive dist output
        id: archive
        shell: bash
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          build_time="$(TZ='Asia/Shanghai' date +'%Y%m%d-%H%M%S')"
          asset_name="dist-${tag_name}-${build_time}.zip"

          WORKDIR="$PWD"
          cd dist
          zip -r "${WORKDIR}/${asset_name}" .
          cd "$WORKDIR"

          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.asset_name }}
          path: ${{ steps.archive.outputs.asset_name }}
          retention-days: 30

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.asset_name }}
          overwrite_files: true
          fail_on_unmatched_files: true
